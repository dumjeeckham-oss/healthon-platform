name: HealthON CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Run tests
        run: flutter test
        working-directory: apps/mobile

      - name: Build APK
        run: flutter build apk --release
        working-directory: apps/mobile