name: healthon
description: 건강ON - 건강 챌린지 플랫폼

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dependencies:
  rive: ^0.13.20   
  confetti: ^0.8.0
  lottie: ^3.3.1
  lottie: ^3.1.2
  audioplayers: ^6.0.0

  cupertino_icons: ^1.0.8

  # ==========================
  # State Management
  # ==========================
  flutter_riverpod: ^2.6.1

  # ==========================
  # Routing
  # ==========================
  go_router: ^16.0.0

  # ==========================
  # Backend
  # ==========================
  supabase_flutter: ^2.9.1

  # ==========================
  # Authentication
  # ==========================
  google_sign_in: ^7.1.1
  sign_in_with_apple: ^7.0.1

  # ==========================
  # Firebase
  # ==========================
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  # ==========================
  # Notifications
  # ==========================
  flutter_local_notifications: ^19.4.0

  # ==========================
  # Health
  # ==========================
  health: ^13.1.1

  # ==========================
  # Charts
  # ==========================
  fl_chart: ^1.1.0

  # ==========================
  # Images
  # ==========================
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ==========================
  # Environment
  # ==========================
  flutter_dotenv: ^6.0.0

  # ==========================
  # Utilities
  # ==========================
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  url_strategy: ^0.3.0

  # ==========================
  # JSON
  # ==========================
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  freezed: ^3.2.0
  json_serializable: ^6.10.0

  # Splash Generator
  flutter_native_splash: ^2.4.6

  # Launcher Icon Generator
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/animations/
    - assets/sounds/
    - .env
